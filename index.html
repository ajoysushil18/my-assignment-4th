<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-7xl mx-auto p-4">

    <h1 class="text-3xl font-bold mb-6">
        Job Application Tracker Dashboard
    </h1>

    <div class="grid md:grid-cols-3 gap-4 mb-8">

        <div class="bg-white p-6 rounded-xl shadow">
            <h2>Total Jobs</h2>
            <p id="totalCount">0</p>
        </div>

        <div class="bg-blue-100 p-6 rounded-xl shadow">
            <h2>Interview</h2>
            <p id="interviewCount">0</p>
        </div>

        <div class="bg-red-100 p-6 rounded-xl shadow">
            <h2>Rejected</h2>
            <p id="rejectedCount">0</p>
        </div>

    </div>

</div>
<div class="bg-white p-6 rounded-xl shadow">

    <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Available Jobs</h2>
        <p id="tabCount" class="font-bold"></p>
    </div>

    <div class="flex gap-4 mb-6">
        <button class="tabBtn bg-gray-200 px-4 py-2 rounded" data-tab="all">All</button>
        <button class="tabBtn bg-gray-200 px-4 py-2 rounded" data-tab="interview">Interview</button>
        <button class="tabBtn bg-gray-200 px-4 py-2 rounded" data-tab="rejected">Rejected</button>
    </div>

    <div id="jobContainer"></div>

    <div id="emptyMessage" class="hidden">
        No jobs available
    </div>

</div>

</body>

<script src="script.js"></script>
</html>
